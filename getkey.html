<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Client - Get Key</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0015, #1a0030, #0a0015);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(20, 5, 40, 0.95);
            border: 2px solid #9600e6;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 30px rgba(150, 0, 230, 0.3);
        }
        h1 {
            color: #c896ff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .quest-box {
            background: rgba(30, 10, 50, 0.8);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .quest-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin: 10px 0;
            background: rgba(40, 15, 60, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .quest-item:hover {
            background: rgba(100, 0, 180, 0.4);
            border: 1px solid #9600e6;
        }
        .quest-item.completed {
            background: rgba(0, 150, 50, 0.3);
            border: 1px solid #00ff66;
            cursor: default;
        }
        .quest-num {
            width: 30px; height: 30px;
            background: #9600e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .quest-item.completed .quest-num {
            background: #00cc44;
        }
        .quest-text {
            flex: 1;
            font-size: 13px;
        }
        .quest-reward {
            color: #ffcc00;
            font-size: 12px;
            font-weight: bold;
        }
        .key-display {
            background: #000;
            color: #00ff66;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            margin: 20px 0;
            word-break: break-all;
            display: none;
            border: 1px solid #00ff66;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(0,255,100,0.3); }
            to { box-shadow: 0 0 25px rgba(0,255,100,0.6); }
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #7800cc, #9600e6);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(150, 0, 230, 0.5);
        }
        .btn.copy {
            background: linear-gradient(135deg, #006600, #00aa00);
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #9600e6, #00ff66);
            transition: width 0.5s;
            border-radius: 4px;
        }
        .status {
            font-size: 13px;
            color: #aaa;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Shadow Client</h1>
        <p class="subtitle">Hoan thanh 3 quest de nhan key!</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%"></div>
        </div>
        <p class="status" id="status">0/3 quest hoan thanh</p>
        
        <div class="quest-box" id="questList"></div>
        
        <div class="key-display" id="keyDisplay"></div>
        <button class="btn copy" id="copyBtn" onclick="copyKey()">📋 COPY KEY</button>
    </div>

    <script>
        var quests = [
            { name: "Tham gia Discord Server", link: "https://discord.gg/UHCHSnD7Xj", reward: "+1 ngay" },
            { name: "Xem kenh YouTube", link: "https://youtube.com/@ShadowClient", reward: "+1 ngay" },
            { name: "Chia se link nay cho ban be", link: "#", reward: "+1 ngay", action: "share" }
        ];
        
        var completed = 0;
        var keys = [
            "SHADOW-Hfm3-J3us-Ku2s",
            "SHADOW-Nx7m-Pq2w-Zu8a",
            "SHADOW-Vb4k-Lm9x-Qw1p",
            "SHADOW-Rt6y-Ui3o-Pa5d",
            "SHADOW-Gh2j-Kl8n-Bv4c",
            "SHADOW-Xz9q-We5r-Ty7u",
            "SHADOW-Mn1b-Vc3x-Za6s",
            "SHADOW-Lk4j-Hg7f-Ds2a",
            "SHADOW-Po9i-Uy5t-Re8w",
            "SHADOW-Qa2z-Ws4x-Ed6c"
        ];
        
        function loadQuests() {
            var list = document.getElementById('questList');
            quests.forEach(function(q, i) {
                var div = document.createElement('div');
                div.className = 'quest-item';
                div.id = 'quest' + i;
                div.innerHTML = '<div class="quest-num">' + (i+1) + '</div>' +
                    '<div class="quest-text">' + q.name + '</div>' +
                    '<div class="quest-reward">' + q.reward + '</div>';
                div.onclick = function() { completeQuest(i); };
                list.appendChild(div);
            });
        }
        
        function completeQuest(i) {
            var quest = document.getElementById('quest' + i);
            if (quest.className.indexOf('completed') >= 0) return;
            
            if (quests[i].action == 'share') {
                if (navigator.share) {
                    navigator.share({ title: 'Shadow Client', text: 'Shadow Client - Roblox Executor UNC 99%', url: window.location.href });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert('Link da duoc copy! Hay chia se cho ban be!');
                }
            } else {
                window.open(quests[i].link, '_blank');
            }
            
            quest.className = 'quest-item completed';
            quest.querySelector('.quest-num').textContent = '✓';
            completed++;
            updateProgress();
        }
        
        function updateProgress() {
            var pct = (completed / quests.length) * 100;
            document.getElementById('progress').style.width = pct + '%';
            document.getElementById('status').textContent = completed + '/' + quests.length + ' quest hoan thanh';
            
            if (completed >= quests.length) {
                showKey();
            }
        }
        
        function showKey() {
            var randomKey = keys[Math.floor(Math.random() * keys.length)];
            var keyDiv = document.getElementById('keyDisplay');
            keyDiv.style.display = 'block';
            keyDiv.textContent = randomKey;
            document.getElementById('copyBtn').style.display = 'inline-block';
            document.getElementById('status').textContent = '✅ Chuc mung! Key cua ban:';
        }
        
        function copyKey() {
            var key = document.getElementById('keyDisplay').textContent;
            navigator.clipboard.writeText(key).then(function() {
                alert('Key da duoc copy! Dan vao Shadow Client de su dung!');
            });
        }
        
        loadQuests();
    </script>
</body>
</html>
